<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | ATLA TOURS</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Estilos específicos para admin */
        .admin-container {
            max-width: 1400px;
            margin: 120px auto 60px;
            padding: 0 20px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary-color);
        }
        
        .admin-header h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
        }
        
        .admin-logout {
            background: #dc3545;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            transition: var(--transition);
        }
        
        .admin-logout:hover {
            background: #c82333;
        }
        
        .admin-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--light-gray);
        }
        
        .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            color: var(--gray-color);
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 3px solid transparent;
        }
        
        .tab-btn:hover {
            color: var(--primary-color);
        }
        
        .tab-btn.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* Formulario */
        .admin-form {
            background: var(--light-color);
            padding: 30px;
            border-radius: var(--border-radius);
            margin-bottom: 30px;
        }
        
        .admin-form h3 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark-color);
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.95rem;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        /* Lista de tours */
        .tours-admin-list {
            display: grid;
            gap: 20px;
        }
        
        .tour-admin-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .tour-admin-info h4 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        
        .tour-admin-info p {
            color: var(--gray-color);
            font-size: 0.9rem;
        }
        
        .tour-admin-actions {
            display: flex;
            gap: 10px;
        }
        
        .btn-edit, .btn-delete, .btn-toggle {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        
        .btn-edit {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-edit:hover {
            background: var(--primary-dark);
        }
        
        .btn-delete {
            background: #dc3545;
            color: white;
        }
        
        .btn-delete:hover {
            background: #c82333;
        }
        
        .btn-toggle {
            background: var(--secondary-color);
            color: white;
        }
        
        .btn-toggle.destacado {
            background: var(--accent-color);
        }
        
        .preview-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid var(--primary-color);
        }
        
        .preview-card h4 {
            color: var(--primary-color);
            margin-bottom: 15px;
        }
        
        .notification {
            position: fixed;
            top: 100px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 5px;
            color: white;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        
        .notification.success {
            background: var(--secondary-color);
        }
        
        .notification.error {
            background: #dc3545;
        }
        
        .notification.info {
            background: var(--primary-color);
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: var(--border-radius);
            width: 90%;
            max-width: 400px;
        }
        
        .login-box h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
            text-align: center;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
        }
        
        .error-message {
            color: #dc3545;
            font-size: 0.9rem;
            margin-top: 10px;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .tour-admin-card {
                flex-direction: column;
                text-align: center;
            }
            
            .admin-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Login overlay -->
        <div id="login-overlay" class="login-overlay">
            <div class="login-box">
                <h2>🔐 Panel de Administración</h2>
                <input type="text" id="login-username" placeholder="Usuario" autocomplete="off">
                <input type="password" id="login-password" placeholder="Contraseña">
                <button id="login-btn">Iniciar Sesión</button>
                <div id="login-error" class="error-message"></div>
            </div>
        </div>
        
        <!-- Contenido admin (oculto hasta login) -->
        <div id="admin-content" style="display: none;">
            <div class="admin-container">
                <div class="admin-header">
                    <h1><i class="fas fa-cog"></i> Panel de Administración</h1>
                    <button id="logout-btn" class="admin-logout"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
                </div>
                
                <!-- Pestañas -->
                <div class="admin-tabs">
                    <button class="tab-btn active" data-tab="tours">📋 Gestionar Tours</button>
                    <button class="tab-btn" data-tab="destacados">⭐ Tours Destacados</button>
                    <button class="tab-btn" data-tab="nuevo">➕ Crear Nuevo Tour</button>
                </div>
                
                <!-- Pestaña: Lista de Tours -->
                <div id="tab-tours" class="tab-content active">
                    <h2>Tours Existentes</h2>
                    <div id="tours-list" class="tours-admin-list">
                        <!-- Aquí se cargarán los tours dinámicamente -->
                    </div>
                </div>
                
                <!-- Pestaña: Tours Destacados -->
                <div id="tab-destacados" class="tab-content">
                    <h2>Seleccionar Tours Destacados</h2>
                    <p class="subtitle">Selecciona hasta 3 tours que aparecerán en la página de inicio</p>
                    <div id="destacados-list" class="tours-admin-list">
                        <!-- Aquí se cargarán los tours para seleccionar destacados -->
                    </div>
                    <button id="save-destacados-btn" class="btn" style="margin-top: 20px;">Guardar Destacados</button>
                </div>
                
                <!-- Pestaña: Crear Nuevo Tour -->
                <div id="tab-nuevo" class="tab-content">
                    <div class="admin-form">
                        <h3>Crear Nuevo Tour</h3>
                        <form id="create-tour-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>ID del Tour (único, sin espacios)</label>
                                    <input type="text" id="tour-id" placeholder="ej: nuevo-tour" required>
                                </div>
                                <div class="form-group">
                                    <label>Título</label>
                                    <input type="text" id="tour-titulo" placeholder="Nombre del tour" required>
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Categoría</label>
                                    <input type="text" id="tour-categoria" placeholder="ej: 1dia proximo" required>
                                </div>
                                <div class="form-group">
                                    <label>Fecha</label>
                                    <input type="text" id="tour-fecha" placeholder="ej: Domingo 15 de marzo, 2026" required>
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Duración</label>
                                    <input type="text" id="tour-duracion" placeholder="ej: 1 día (ida y vuelta)" required>
                                </div>
                                <div class="form-group">
                                    <label>Ubicación</label>
                                    <input type="text" id="tour-ubicacion" placeholder="ej: Hidalgo" required>
                                </div>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Estado</label>
                                    <select id="tour-estado">
                                        <option value="proximo">Próximo</option>
                                        <option value="realizado">Realizado</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Descripción corta</label>
                                    <input type="text" id="tour-descripcion" placeholder="Descripción breve" required>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label>Descripción completa</label>
                                <textarea id="tour-descripcion-larga" placeholder="Descripción detallada del tour" required></textarea>
                            </div>
                            
                            <div class="form-group">
                                <label>Itinerario (formato: hora | actividad, uno por línea)</label>
                                <textarea id="tour-itinerario" placeholder="Ejemplo:&#10;07:00 AM | Cita en punto de reunión&#10;07:30 AM | Salida puntual" rows="5" required></textarea>
                            </div>
                            
                            <div class="form-group">
                                <label>Qué incluye (uno por línea)</label>
                                <textarea id="tour-incluye" placeholder="Ejemplo:&#10;Viaje redondo ida y vuelta&#10;Entrada al balneario" rows="4" required></textarea>
                            </div>
                            
                            <div class="form-group">
                                <label>Precios (formato: tipo | precio, uno por línea)</label>
                                <textarea id="tour-precios" placeholder="Ejemplo:&#10;Adultos | $700&#10;Niños | $500" rows="4" required></textarea>
                            </div>
                            
                            <div class="form-group">
                                <label>Promociones (opcional, formato: descripción | precio)</label>
                                <textarea id="tour-promociones" placeholder="Ejemplo:&#10;Primeras 10 personas | $750" rows="3"></textarea>
                            </div>
                            
                            <div class="form-group">
                                <label>Nota de reserva</label>
                                <input type="text" id="tour-reserva-nota" placeholder="Aparta tu lugar con $300">
                            </div>
                            
                            <div class="form-group">
                                <label>Imágenes (URLs, una por línea)</label>
                                <textarea id="tour-imagenes" placeholder="https://ejemplo.com/imagen1.jpg&#10;https://ejemplo.com/imagen2.jpg" rows="3" required></textarea>
                            </div>
                            
                            <div id="tour-preview" class="preview-card">
                                <h4>Vista previa del tour</h4>
                                <div id="preview-content"></div>
                            </div>
                            
                            <button type="submit" class="btn">Crear Tour</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="components.js"></script>
    <script src="admin.js"></script>
</body>
</html>
