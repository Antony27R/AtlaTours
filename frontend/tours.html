<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tours | ATLA TOURS - Donde la vida fluye</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <!-- Filtros de Tours -->
        <section class="tour-filters">
            <div class="container">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">Todos</button>
                    <button class="filter-btn" data-filter="1dia">1 Día</button>
                    <button class="filter-btn" data-filter="2dias">2 Días</button>
                    <button class="filter-btn" data-filter="realizado">Realizados</button>
                    <button class="filter-btn" data-filter="proximo">Próximos</button>
                </div>
            </div>
        </section>

        <!-- Lista de Tours (se llena dinámicamente) -->
        <section class="tours-list">
            <div class="container" id="tours-container">
                <div style="text-align: center; padding: 60px;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary-color);"></i>
                    <p>Cargando tours...</p>
                </div>
            </div>
        </section>
    </main>

    <script src="components.js"></script>
    <script>
        // Cargar componentes (header, footer, etc)
        loadPageWithHeader('Nuestros Tours', 'tours');
        
        const API_URL = 'https://atla-tours-backend.onrender.com/api';
        
        // Función para cambiar imagen en galería
        window.changeImage = function(tourId, imageNumber) {
            const mainImage = document.getElementById(`main-image-${tourId}`);
            const thumbnails = document.querySelectorAll(`#${tourId} .thumbnail`);
            
            if (mainImage && thumbnails[imageNumber - 1]) {
                mainImage.src = thumbnails[imageNumber - 1].src;
                thumbnails.forEach(thumb => thumb.classList.remove('active'));
                thumbnails[imageNumber - 1].classList.add('active');
            }
        };
        
        // Escapar HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Generar HTML de un tour
        function createTourHTML(tour) {
            return `
                <div class="tour-detailed" id="${tour.id}" data-category="${tour.categoria}">
                    <div class="tour-gallery">
                        <div class="main-image">
                            <img src="${tour.imagenes[0] || 'https://via.placeholder.com/800x400'}" alt="${escapeHtml(tour.titulo)}" id="main-image-${tour.id}">
                        </div>
                        <div class="thumbnail-grid">
                            ${tour.imagenes.map((img, idx) => `
                                <img src="${img}" alt="${escapeHtml(tour.titulo)} ${idx+1}" class="thumbnail ${idx === 0 ? 'active' : ''}" onclick="changeImage('${tour.id}', ${idx+1})">
                            `).join('')}
                        </div>
                    </div>
                    <div class="tour-details">
                        <h2>${escapeHtml(tour.titulo)}</h2>
                        <div class="tour-meta-large">
                            <span><i class="far fa-calendar-alt"></i> ${escapeHtml(tour.fecha)}</span>
                            <span><i class="far fa-clock"></i> ${escapeHtml(tour.duracion)}</span>
                            <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(tour.ubicacion)}</span>
                            <span><i class="fas ${tour.estado === 'realizado' ? 'fa-check-circle' : 'fa-clock'}" style="color:${tour.estado === 'realizado' ? '#2e8b57' : '#f4a261'}"></i> ${tour.estado === 'realizado' ? 'Realizado' : 'Próximamente'}</span>
                        </div>
                        <div class="tour-description-full">
                            <h3>Descripción</h3>
                            <p>${escapeHtml(tour.descripcionLarga || tour.descripcion)}</p>
                        </div>
                        <div class="tour-itinerary">
                            <h3>Itinerario</h3>
                            <ul class="timeline">
                                ${tour.itinerario.map(item => `
                                    <li><span class="time">${escapeHtml(item.hora)}</span><span class="description">${escapeHtml(item.actividad)}</span></li>
                                `).join('')}
                            </ul>
                        </div>
                        <div class="tour-includes">
                            <h3>¿Qué incluye?</h3>
                            <ul class="includes-list">
                                ${tour.incluye.map(item => `<li><i class="fas fa-check-circle"></i> ${escapeHtml(item)}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="tour-pricing">
                            <h3>Precios por persona</h3>
                            <div class="price-grid">
                                ${tour.precios.map(p => `
                                    <div class="price-item"><span class="age">${escapeHtml(p.tipo)}</span><span class="amount">${escapeHtml(p.precio)}</span></div>
                                `).join('')}
                            </div>
                            ${tour.promociones && tour.promociones.length ? `
                                <div class="price-grid">
                                    ${tour.promociones.map(p => `
                                        <div class="price-item highlight"><span class="age">${escapeHtml(p.descripcion)}</span><span class="amount">${escapeHtml(p.precio)}</span></div>
                                    `).join('')}
                                </div>
                            ` : ''}
                            <p class="reservation-note"><i class="fas fa-info-circle"></i> ${escapeHtml(tour.reservaNota)}</p>
                        </div>
                        <div class="tour-actions">
                            <a href="contacto.html" class="btn">${tour.estado === 'realizado' ? 'Consultar disponibilidad' : 'Apartar mi lugar'}</a>
                            <a href="https://wa.me/5215614232739?text=Hola,%20me%20interesa%20el%20tour%20a%20${encodeURIComponent(tour.titulo)}" class="btn btn-whatsapp" target="_blank">
                                <i class="fab fa-whatsapp"></i> WhatsApp
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Cargar tours desde la API
        async function loadTours() {
            const container = document.getElementById('tours-container');
            if (!container) return;
            
            try {
                const response = await fetch(`${API_URL}/tours`);
                const tours = await response.json();
                
                if (!tours || tours.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 60px;"><p>No hay tours disponibles por el momento.</p></div>';
                    return;
                }
                
                container.innerHTML = tours.map(tour => createTourHTML(tour)).join('');
                
                // Inicializar filtros después de cargar
                initFilters();
                
            } catch (error) {
                console.error('Error cargando tours:', error);
                container.innerHTML = '<div style="text-align: center; padding: 60px;"><p style="color: red;">Error cargando tours. Asegúrate que el servidor esté corriendo.</p></div>';
            }
        }
        
        // Inicializar filtros de tours
        function initFilters() {
            const filterButtons = document.querySelectorAll('.filter-btn');
            const tourItems = document.querySelectorAll('.tour-detailed');
            
            if (filterButtons.length === 0) return;
            
            filterButtons.forEach(button => {
                button.addEventListener('click', function() {
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    
                    const filterValue = this.getAttribute('data-filter');
                    
                    tourItems.forEach(tour => {
                        const category = tour.getAttribute('data-category');
                        if (filterValue === 'all' || (category && category.includes(filterValue))) {
                            tour.style.display = 'grid';
                        } else {
                            tour.style.display = 'none';
                        }
                    });
                });
            });
        }
        
        // Esperar a que los componentes se carguen antes de cargar tours
        setTimeout(() => {
            loadTours();
        }, 500);
    </script>
    <script src="main.js"></script>
</body>
</html>
