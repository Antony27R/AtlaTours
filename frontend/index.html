            <!-- Sección de Tours Destacados -->
<!-- Sección de Tours Destacados (reemplazar la sección completa) -->
<section id="destacados" class="featured-tours">
    <div class="container">
        <div class="section-title">
            <h2>Tours Destacados</h2>
            <div class="title-line"></div>
            <p class="subtitle">Las experiencias más populares de ATLA</p>
        </div>

        <div id="destacados-container" class="tours-grid">
            <div style="text-align: center; grid-column: 1/-1; padding: 40px;">
                <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary-color);"></i>
                <p>Cargando tours destacados...</p>
            </div>
        </div>

        <div class="section-footer">
            <a href="tours.html" class="btn">Ver todos los tours <i class="fas fa-arrow-right"></i></a>
        </div>
    </div>
</section>

<script>
    // Cargar tours destacados desde la API
    async function loadDestacados() {
        const container = document.getElementById('destacados-container');
        if (!container) return;
        
        try {
            const response = await fetch('https://atla-tours-backend.onrender.com/api/tours/destacados');
            const tours = await response.json();
            
            if (!tours || tours.length === 0) {
                container.innerHTML = '<div style="text-align: center; grid-column: 1/-1; padding: 40px;"><p>No hay tours destacados por el momento.</p></div>';
                return;
            }
            
            container.innerHTML = tours.map(tour => `
                <div class="tour-card">
                    <div class="tour-image">
                        <img src="${tour.imagenes[0] || 'https://via.placeholder.com/400x200'}" alt="${escapeHtml(tour.titulo)}">
                        <span class="tour-badge">${tour.estado === 'realizado' ? 'Realizado' : 'Próximo'}</span>
                    </div>
                    <div class="tour-info">
                        <h3>${escapeHtml(tour.titulo)}</h3>
                        <div class="tour-meta">
                            <span><i class="far fa-calendar"></i> ${escapeHtml(tour.fecha.split(',').pop() || tour.fecha)}</span>
                            <span><i class="far fa-clock"></i> ${escapeHtml(tour.duracion.split(' ')[0])}</span>
                            <span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(tour.ubicacion)}</span>
                        </div>
                        <p class="tour-description">${escapeHtml(tour.descripcion.substring(0, 100))}${tour.descripcion.length > 100 ? '...' : ''}</p>
                        <div class="tour-price">
                            <span class="price">${escapeHtml(tour.precios[0]?.precio || 'Consultar')}</span>
                            <a href="tours.html#${tour.id}" class="btn-small">Ver detalles</a>
                        </div>
                    </div>
                </div>
            `).join('');
            
        } catch (error) {
            console.error('Error cargando destacados:', error);
            container.innerHTML = '<div style="text-align: center; grid-column: 1/-1; padding: 40px;"><p style="color: red;">Error cargando tours destacados. Asegúrate que el servidor esté corriendo.</p></div>';
        }
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Esperar a que la página cargue
    document.addEventListener('DOMContentLoaded', () => {
        loadDestacados();
    });
</script>
    </main>

<script>
    // Cargar tours destacados desde la API
    async function loadDestacadosFromAPI() {
        try {
            const response = await fetch('http://localhost:3000/api/tours/destacados');
            const tours = await response.json();
            renderDestacados(tours);
        } catch (error) {
            console.error('Error cargando tours destacados:', error);
        }
    }
    
    function renderDestacados(tours) {
        const container = document.querySelector('.tours-grid');
        if (!container) return;
        
        container.innerHTML = tours.map(tour => `
            <div class="tour-card">
                <div class="tour-image">
                    <img src="${tour.imagenes[0] || 'https://via.placeholder.com/400x200'}" alt="${tour.titulo}">
                    <span class="tour-badge">${tour.estado === 'realizado' ? 'Realizado' : 'Próximo'}</span>
                </div>
                <div class="tour-info">
                    <h3>${tour.titulo}</h3>
                    <div class="tour-meta">
                        <span><i class="far fa-calendar"></i> ${tour.fecha.split(',').pop() || tour.fecha}</span>
                        <span><i class="far fa-clock"></i> ${tour.duracion.split(' ')[0]}</span>
                        <span><i class="fas fa-map-marker-alt"></i> ${tour.ubicacion}</span>
                    </div>
                    <p class="tour-description">${tour.descripcion.substring(0, 100)}${tour.descripcion.length > 100 ? '...' : ''}</p>
                    <div class="tour-price">
                        <span class="price">${tour.precios[0]?.precio || 'Consultar'}</span>
                        <a href="tours.html#${tour.id}" class="btn-small">Ver detalles</a>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    // Cargar destacados al iniciar
    document.addEventListener('DOMContentLoaded', () => {
        loadDestacadosFromAPI();
    });
</script>
